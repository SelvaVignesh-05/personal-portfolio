<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Premium Calculator</title>
    <style>
        /* Premium Dark Mode Styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Glassmorphism Calculator Body */
        .calculator {
            background: rgba(30, 41, 59, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 28px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 340px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Attractive Dual-Line Screen Display */
        .display-container {
            background: rgba(15, 23, 42, 0.6);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: right;
            min-height: 90px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .previous-op {
            color: #64748b;
            font-size: 0.95rem;
            min-height: 20px;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }

        .current-val {
            color: #38bdf8;
            font-size: 2.2rem;
            font-weight: 600;
            word-wrap: break-word;
            word-break: break-all;
            line-height: 1;
        }

        /* Geometric Grid Arrangement */
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }

        /* Circular Premium Buttons */
        button {
            background: rgba(255, 255, 255, 0.04);
            color: #f8fafc;
            border: 1px solid rgba(255, 255, 255, 0.05);
            aspect-ratio: 1;
            font-size: 1.4rem;
            font-weight: 500;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        /* Vivid Neon Accents for Operators */
        button.operator {
            background: rgba(56, 189, 248, 0.1);
            color: #38bdf8;
            border-color: rgba(56, 189, 248, 0.2);
            font-size: 1.6rem;
        }

        button.operator:hover {
            background: #38bdf8;
            color: #0f172a;
        }

        /* Warning Accent for Clear */
        button.clear {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.2);
        }

        button.clear:hover {
            background: #ef4444;
            color: white;
        }

        /* Success Accent for Equals Button */
        button.equal {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: #ffffff;
            border: none;
            grid-column: span 2;
            aspect-ratio: auto;
            border-radius: 30px;
            font-size: 1.6rem;
        }

        button.equal:hover {
            background: linear-gradient(135deg, #34d399 0%, #059669 100%);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }
    </style>
</head>
<body>

    <div class="calculator">
        <div class="display-container">
            <div class="previous-op" id="history"></div>
            <div class="current-val" id="screen">0</div>
        </div>

        <div class="buttons-grid">
            <button class="clear" onclick="pressClear()">C</button>
            <button class="operator" onclick="pressOperator('%')">%</button>
            <button class="operator" onclick="pressOperator('/')">÷</button>
            <button class="operator" onclick="pressOperator('*')">×</button>

            <button onclick="pressNum('7')">7</button>
            <button onclick="pressNum('8')">8</button>
            <button onclick="pressNum('9')">9</button>
            <button class="operator" onclick="pressOperator('-')">−</button>

            <button onclick="pressNum('4')">4</button>
            <button onclick="pressNum('5')">5</button>
            <button onclick="pressNum('6')">6</button>
            <button class="operator" onclick="pressOperator('+')">+</button>

            <button onclick="pressNum('1')">1</button>
            <button onclick="pressNum('2')">2</button>
            <button onclick="pressNum('3')">3</button>
            <button class="equal" onclick="pressEquals()">=</button>

            <button onclick="pressNum('0')" style="grid-column: span 2; aspect-ratio: auto; border-radius: 30px;">0</button>
            <button onclick="pressNum('.')">.</button>
        </div>
    </div>

    <script>
        const screen = document.getElementById('screen');
        const historyScreen = document.getElementById('history');
        
        let memoryValue = "";
        let currentOp = "";
        let resetOnNextInput = false;

        function pressNum(num) {
            if (screen.innerText === "0" || resetOnNextInput) {
                if (num === ".") {
                    screen.innerText = "0.";
                } else {
                    screen.innerText = num;
                }
                resetOnNextInput = false;
            } else {
                if (num === "." && screen.innerText.includes(".")) return;
                screen.innerText += num;
            }
        }

        function pressOperator(op) {
            memoryValue = screen.innerText;
            currentOp = op;
            let symbol = op === '*' ? '×' : op === '/' ? '÷' : op;
            historyScreen.innerText = memoryValue + " " + symbol;
            resetOnNextInput = true;
        }

        function pressEquals() {
            if (!currentOp || memoryValue === "") return;

            let valA = parseFloat(memoryValue);
            let valB = parseFloat(screen.innerText);
            let output = 0;

            if (currentOp === "+") output = valA + valB;
            else if (currentOp === "-") output = valA - valB;
            else if (currentOp === "*") output = valA * valB;
            else if (currentOp === "%") output = valA % valB;
            else if (currentOp === "/") {
                output = valB === 0 ? "Error" : valA / valB;
            }

            let symbol = currentOp === '*' ? '×' : currentOp === '/' ? '÷' : currentOp;
            historyScreen.innerText = valA + " " + symbol + " " + valB + " =";
            screen.innerText = output;

            // Reset calculation states
            memoryValue = "";
            currentOp = "";
            resetOnNextInput = true;
        }

        function pressClear() {
            screen.innerText = "0";
            historyScreen.innerText = "";
            memoryValue = "";
            currentOp = "";
            resetOnNextInput = false;
        }
    </script>
</body>
</html>
