<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Grid Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Calculator Wrapper */
        .calculator {
            background-color: #1e293b;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 340px;
            border: 1px solid #334155;
        }

        /* Display Screen */
        .display {
            background-color: #0f172a;
            color: #38bdf8;
            font-size: 2rem;
            text-align: right;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            min-height: 70px;
            word-wrap: break-word;
            word-break: break-all;
            border: 1px solid #334155;
        }

        /* CSS Grid System for Button Alignment */
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            background-color: #334155;
            color: #f8fafc;
            border: none;
            padding: 20px;
            font-size: 1.25rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: #475569;
        }

        /* Customizing specific button spans and colors */
        button.operator {
            background-color: #f97316;
            color: #ffffff;
        }

        button.operator:hover {
            background-color: #ea580c;
        }

        button.clear {
            background-color: #ef4444;
            color: #ffffff;
            grid-column: span 2;
        }

        button.clear:hover {
            background-color: #dc2626;
        }

        button.equal {
            background-color: #10b981;
            color: #ffffff;
            grid-column: span 2;
        }

        button.equal:hover {
            background-color: #059669;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <div class="display" id="screen">0</div>

        <div class="buttons-grid" id="button-container">
            <button class="clear" data-action="clear">C</button>
            <button class="operator" data-op="/">÷</button>
            <button class="operator" data-op="*">×</button>

            <button data-num="7">7</button>
            <button data-num="8">8</button>
            <button data-num="9">9</button>
            <button class="operator" data-op="-">−</button>

            <button data-num="4">4</button>
            <button data-num="5">5</button>
            <button data-num="6">6</button>
            <button class="operator" data-op="+">+</button>

            <button data-num="1">1</button>
            <button data-num="2">2</button>
            <button data-num="3">3</button>
            <button class="equal" data-action="calculate">=</button>

            <button data-num="0" style="grid-column: span 2;">0</button>
            <button data-num=".">.</button>
        </div>
    </div>

    <script>
        const screen = document.getElementById('screen');
        const container = document.getElementById('button-container');
        
        let currentInput = '0';
        let previousInput = '';
        let operation = null;
        let shouldResetScreen = false;

        // Using a single event listener on the parent container (Event Delegation)
        container.addEventListener('click', (e) => {
            if (!e.target.matches('button')) return;

            const button = e.target;
            const num = button.dataset.num;
            const op = button.dataset.op;
            const action = button.dataset.action;

            if (num) handleNumber(num);
            if (op) handleOperator(op);
            if (action === 'clear') handleClear();
            if (action === 'calculate') handleCalculate();

            updateDisplay();
        });

        function handleNumber(num) {
            if (currentInput === '0' || shouldResetScreen) {
                currentInput = num;
                shouldResetScreen = false;
            } else {
                // Prevent duplicate decimals
                if (num === '.' && currentInput.includes('.')) return;
                currentInput += num;
            }
        }

        function handleOperator(nextOperator) {
            const value = parseFloat(currentInput);

            if (operation && shouldResetScreen) {
                operation = nextOperator;
                return;
            }

            if (previousInput === '') {
                previousInput = currentInput;
            } else if (operation) {
                const result = runCalculation(parseFloat(previousInput), value, operation);
                currentInput = String(result);
                previousInput = String(result);
            }

            operation = nextOperator;
            shouldResetScreen = true;
        }

        function handleCalculate() {
            if (!operation || shouldResetScreen) return;
            
            currentInput = String(runCalculation(parseFloat(previousInput), parseFloat(currentInput), operation));
            previousInput = '';
            operation = null;
            shouldResetScreen = true;
        }

        function handleClear() {
            currentInput = '0';
            previousInput = '';
            operation = null;
            shouldResetScreen = false;
        }

        // Using operators & if-else logic to handle computing
        function runCalculation(a, b, op) {
            if (op === '+') return a + b;
            if (op === '-') return a - b;
            if (op === '*') return a * b;
            if (op === '/') {
                if (b === 0) return 'Error'; // Handle division by zero safely
                return a / b;
            }
            return b;
        }

        function updateDisplay() {
            screen.innerText = currentInput;
        }
    </script>
</body>
</html>
