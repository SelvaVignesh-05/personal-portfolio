<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[YOUR NAME] | Personal Portfolio</title>
    <style>
        /* Modern Reset & CSS Variables */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 0 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Top Assignment Navigation Bar */
        .assignment-nav {
            background: #1e293b;
            padding: 12px 20px;
            margin-top: 20px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #334155;
        }
        .assignment-nav p {
            font-weight: bold;
            color: var(--accent-color);
        }
        .assignment-links {
            display: flex;
            gap: 15px;
        }
        .assignment-links a {
            color: var(--text-main);
            text-decoration: none;
            background: #334155;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.85rem;
            transition: 0.2s;
        }
        .assignment-links a:hover {
            background: var(--accent-color);
            color: var(--bg-color);
        }

        /* Header Section */
        header {
            padding: 40px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .tagline {
            font-style: italic;
            color: var(--text-muted);
        }

        /* Section Layouts */
        section {
            padding: 60px 0;
            border-bottom: 1px solid #334155;
        }
        h2 {
            font-size: 2rem;
            margin-bottom: 30px;
            color: var(--accent-color);
            position: relative;
            display: inline-block;
        }
        h2::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -5px;
            width: 50%;
            height: 3px;
            background: var(--accent-color);
            border-radius: 2px;
        }

        /* About Section */
        .about-content {
            display: flex;
            gap: 40px;
            align-items: center;
            flex-wrap: wrap;
        }
        .about-img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent-color);
        }
        .about-text {
            flex: 1;
            min-width: 300px;
        }

        /* Skills Section */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }
        .skill-card {
            background: var(--card-bg);
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            font-weight: 600;
            transition: transform 0.3s;
            border: 1px solid #334155;
        }
        .skill-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
        }

        /* Projects Section */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }
        .project-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #334155;
            transition: 0.3s;
        }
        .project-card:hover {
            transform: scale(1.02);
        }
        .project-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #475569;
        }
        .project-info {
            padding: 20px;
        }
        .project-info h3 {
            margin-bottom: 10px;
            color: var(--text-main);
        }
        .project-info p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Buttons Styling */
        .btn {
            display: inline-block;
            background: transparent;
            color: var(--accent-color);
